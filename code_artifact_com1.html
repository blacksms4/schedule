<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>휴일 근무 관리 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; border: 1px solid #ddd; background: #ddd; }
        .cell { background: white; min-height: 100px; padding: 5px; }
        .weekend { background: #fff5f5; color: #e11d48; }
        .holiday-cell { background: #fffaf0; color: #ea580c; font-weight: bold; }
        canvas { touch-action: none; background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body class="bg-gray-100 p-6">
    <div class="max-w-6xl mx-auto bg-white p-6 rounded shadow">
        <h1 class="text-2xl font-bold text-center mb-6">휴일 근무 관리 시스템</h1>

        <div class="flex border-b mb-6">
            <button onclick="showTab('calendar')" id="btn-calendar" class="px-6 py-2 border-b-4 border-blue-600 font-bold text-blue-600 bg-blue-50">근무표 관리</button>
            <button onclick="showTab('ladder')" id="btn-ladder" class="px-6 py-2 font-bold text-gray-400 hover:text-gray-600">사다리 게임 및 명단 관리</button>
        </div>

        <div id="calendar-tab">
            <div class="flex justify-between items-center mb-4">
                <button onclick="changeMonth(-1)" class="bg-gray-200 px-4 py-1 rounded font-bold">이전달</button>
                <div id="month-title" class="text-xl font-bold">2026년 6월</div>
                <button onclick="changeMonth(1)" class="bg-gray-200 px-4 py-1 rounded font-bold">다음달</button>
            </div>
            <div class="calendar-grid" id="calendar"></div>
        </div>

        <div id="ladder-tab" class="hidden">
            <div class="mb-6 p-4 border rounded bg-gray-50">
                <h2 class="font-bold mb-2">근무자 명단</h2>
                <div class="flex gap-2 mb-4">
                    <input type="text" id="player-input" placeholder="이름 입력" class="flex-1 border p-2 rounded">
                    <button onclick="addPlayer()" class="bg-blue-600 text-white px-4 py-2 rounded font-bold">추가</button>
                </div>
                <div class="flex items-center gap-2 mb-4">
                    <label class="text-sm font-bold">근무자 수:</label>
                    <select id="worker-count" class="border p-2 rounded">
                        <option value="1">1명</option>
                        <option value="2">2명</option>
                        <option value="3">3명</option>
                        <option value="4">4명</option>
                        <option value="5">5명</option>
                        <option value="6">6명</option>
                        <option value="7">7명</option>
                        <option value="8">8명</option>
                    </select>
                </div>
                <div id="player-list" class="flex flex-wrap gap-2"></div>
            </div>

            <div class="flex gap-4">
                <div class="flex-1">
                    <div class="flex gap-2 mb-4">
                        <button onclick="drawLadder()" class="bg-indigo-600 text-white px-4 py-2 rounded font-bold flex-1">사다리 생성</button>
                        <select id="assign-month" class="border p-2 rounded">
                            <option value="0">1월</option>
                            <option value="1">2월</option>
                            <option value="2">3월</option>
                            <option value="3">4월</option>
                            <option value="4">5월</option>
                            <option value="5" selected>6월</option>
                            <option value="6">7월</option>
                            <option value="7">8월</option>
                            <option value="8">9월</option>
                            <option value="9">10월</option>
                            <option value="10">11월</option>
                            <option value="11">12월</option>
                        </select>
                        <button onclick="assignToCalendar()" class="bg-green-600 text-white px-4 py-2 rounded font-bold flex-1">선택 월 근무표 반영</button>
                    </div>
                    <canvas id="ladderCanvas" width="600" height="300"></canvas>
                </div>
                <div class="w-64 p-4 bg-yellow-50 border rounded-lg">
                    <h3 class="font-bold border-b pb-2 mb-2">최종 결과 공지</h3>
                    <div id="final-results" class="text-sm space-y-1"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let players = [];
        let ladderLines = [];
        let finalResults = [];
        let currentYear = 2026, currentMonth = 5; // 6월은 5 (0-indexed)
        let assignments = {};
        let currentPlayerIndex = 0; // 순번 유지를 위한 전역 인덱스
        
        // 주요 공휴일 데이터
        const holidays = {
            "2026-06-06": "현충일",
            "2026-07-17": "제헌절",
            "2026-08-15": "광복절"
        };

        const canvas = document.getElementById('ladderCanvas');
        const ctx = canvas.getContext('2d');

        function showTab(tab) {
            document.getElementById('calendar-tab').classList.toggle('hidden', tab !== 'calendar');
            document.getElementById('ladder-tab').classList.toggle('hidden', tab !== 'ladder');
            
            const btnCalendar = document.getElementById('btn-calendar');
            const btnLadder = document.getElementById('btn-ladder');
            
            if (tab === 'calendar') {
                btnCalendar.className = 'px-6 py-2 border-b-4 border-blue-600 font-bold text-blue-600 bg-blue-50';
                btnLadder.className = 'px-6 py-2 font-bold text-gray-400 hover:text-gray-600';
            } else {
                btnCalendar.className = 'px-6 py-2 font-bold text-gray-400 hover:text-gray-600';
                btnLadder.className = 'px-6 py-2 border-b-4 border-blue-600 font-bold text-blue-600 bg-blue-50';
            }
        }

        function changeMonth(offset) {
            currentMonth += offset;
            if(currentMonth > 11) { currentMonth = 0; currentYear++; }
            if(currentMonth < 0) { currentMonth = 11; currentYear--; }
            document.getElementById('month-title').innerText = `${currentYear}년 ${currentMonth + 1}월`;
            renderCalendar();
        }

        function addPlayer() {
            const input = document.getElementById('player-input');
            if(input.value.trim()) {
                players.push(input.value.trim());
                input.value = "";
                renderPlayerList();
            }
        }

        function removePlayer(index) {
            players.splice(index, 1);
            renderPlayerList();
        }
        function renderPlayerList() {
            const listEl = document.getElementById('player-list');
            listEl.innerHTML = players.map((p, i) => `<span class="bg-blue-100 px-3 py-1 rounded text-sm flex items-center gap-2">${i+1}. ${p} <button onclick="removePlayer(${i})" class="text-red-500 hover:text-red-700 font-bold text-lg leading-none">×</button></span>`).join('');
        }

        function drawLadder() {
            if (players.length < 2) return alert("최소 2명이 필요합니다.");
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ladderLines = []; finalResults = [];
            document.getElementById('final-results').innerHTML = "";
            const colWidth = canvas.width / (players.length + 1);
            ctx.strokeStyle = '#94a3b8'; ctx.lineWidth = 4;
            
            players.forEach((p, i) => {
                let x = (i+1) * colWidth;
                ctx.beginPath(); ctx.moveTo(x, 40); ctx.lineTo(x, 260); ctx.stroke();
                ctx.fillStyle = '#1e293b'; ctx.textAlign = 'center'; ctx.fillText(p, x, 30);
            });

            for(let i = 0; i < players.length * 8; i++) {
                let col = Math.floor(Math.random() * (players.length - 1)) + 1;
                let y = 60 + Math.floor(Math.random() * 10) * 20;
                if(!ladderLines.find(l => l.y === y && (l.col === col || l.col === col-1 || l.col === col+1))) {
                    ladderLines.push({col, y});
                    ctx.beginPath(); ctx.moveTo(col * colWidth, y); ctx.lineTo((col + 1) * colWidth, y); ctx.stroke();
                }
            }
        }

        canvas.addEventListener('click', async (e) => {
            const rect = canvas.getBoundingClientRect();
            const colWidth = canvas.width / (players.length + 1);
            let col = Math.round((e.clientX - rect.left) / colWidth);
            if(col < 1 || col > players.length || finalResults.some(r => r.start === col)) return;
            let curCol = col, curY = 40;
            ctx.strokeStyle = 'red'; ctx.lineWidth = 3;
            while (curY < 260) {
                let hit = ladderLines.filter(l => l.y > curY && (l.col === curCol || l.col === curCol - 1)).sort((a,b) => a.y - b.y)[0];
                if(hit) {
                    ctx.beginPath(); ctx.moveTo(curCol * colWidth, curY); ctx.lineTo(curCol * colWidth, hit.y); ctx.stroke();
                    curY = hit.y;
                    let nextCol = (hit.col === curCol) ? curCol + 1 : curCol - 1;
                    ctx.beginPath(); ctx.moveTo(curCol * colWidth, curY); ctx.lineTo(nextCol * colWidth, curY); ctx.stroke();
                    curCol = nextCol;
                } else {
                    ctx.beginPath(); ctx.moveTo(curCol * colWidth, curY); ctx.lineTo(curCol * colWidth, 260); ctx.stroke();
                    break;
                }
            }
            finalResults.push({start: col, end: curCol});
            document.getElementById('final-results').innerHTML = finalResults.map(r => `<div>${r.start}번 ${players[r.start-1]} → ${r.end}번 도착</div>`).join('');
        });

        function editAssignment(dateKey) {
            const currentValue = assignments[dateKey] || '';
            const newValue = prompt(`${dateKey} 근무자 수정 (여러명은 쉼표로 구분):`, currentValue);
            if (newValue !== null) {
                assignments[dateKey] = newValue.trim();
                renderCalendar();
            }
        }

        function renderCalendar() {
            const calendarEl = document.getElementById('calendar');
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            calendarEl.innerHTML = `일 월 화 수 목 금 토`.split(' ').map((d,i) => `<div class="text-center font-bold py-2 bg-gray-100 ${i===0?'text-red-600':''} ${i===6?'text-blue-600':''}">${d}</div>`).join('');
            for(let i=0; i<firstDay; i++) calendarEl.innerHTML += '<div class="cell bg-gray-50"></div>';
            for(let i=1; i<=daysInMonth; i++) {
                let d = new Date(currentYear, currentMonth, i);
                let dateKey = `${currentYear}-${(currentMonth+1).toString().padStart(2,'0')}-${i.toString().padStart(2,'0')}`;
                let isHoliday = (d.getDay() === 0 || d.getDay() === 6 || holidays[dateKey]);
                calendarEl.innerHTML += `<div class="cell ${isHoliday ? 'weekend holiday-cell' : ''} cursor-pointer hover:bg-gray-50" onclick="editAssignment('${dateKey}')">
                    <div class="font-bold">${i}</div>
                    <div class="text-[10px] text-orange-600">${holidays[dateKey] || ''}</div>
                    <div class="text-xs text-blue-800 font-bold">${assignments[dateKey] || ''}</div>
                </div>`;
            }
        }

        function assignToCalendar() {
            if (players.length === 0) return alert("명단을 먼저 추가하세요.");
            
            // 선택한 근무자 수 가져오기
            const workerCount = parseInt(document.getElementById('worker-count').value);
            if (players.length < workerCount) return alert(`최소 ${workerCount}명의 근무자가 필요합니다.`);
            
            // 선택한 월 가져오기
            const selectedMonth = parseInt(document.getElementById('assign-month').value);
            let targetYear = currentYear;
            let targetMonth = selectedMonth;
            
            // 사다리 결과가 있으면 결과 순서 사용, 없으면 원래 순서 사용
            let orderedPlayers;
            if (finalResults.length > 0) {
                const sortedResults = [...finalResults].sort((a, b) => a.end - b.end);
                orderedPlayers = sortedResults.map(r => players[r.start - 1]);
            } else {
                orderedPlayers = [...players];
            }
            
            // 각 근무자의 근무 횟수 추적
            const workCount = {};
            orderedPlayers.forEach(p => workCount[p] = 0);
            
            let assignedDates = [];
            
            // 선택한 달 배정
            const daysInMonth = new Date(targetYear, targetMonth + 1, 0).getDate();
            for(let i=1; i<=daysInMonth; i++) {
                let d = new Date(targetYear, targetMonth, i);
                let dateKey = `${targetYear}-${(targetMonth+1).toString().padStart(2,'0')}-${i.toString().padStart(2,'0')}`;
                if (d.getDay() === 0 || d.getDay() === 6 || holidays[dateKey]) {
                    // 각 휴일마다 선택한 근무자 수만큼 배정
                    const dayWorkers = [];
                    for (let w = 0; w < workerCount; w++) {
                        const player = orderedPlayers[currentPlayerIndex % orderedPlayers.length];
                        dayWorkers.push(player);
                        workCount[player]++;
                        currentPlayerIndex++;
                    }
                    assignments[dateKey] = dayWorkers.join(', ');
                    assignedDates.push(dateKey);
                }
            }
            
            // 근무 횟수가 다르면 다음 달에 최소 횟수인 사람만 배정하여 맞춤
            const counts = Object.values(workCount);
            const maxCount = Math.max(...counts);
            const minCount = Math.min(...counts);
            
            if (maxCount !== minCount) {
                // 다음 달로 이동
                targetMonth++;
                if (targetMonth > 11) {
                    targetMonth = 0;
                    targetYear++;
                }
                
                // 최소 횟수인 사람만 배정하여 공평하게 맞춤 (공평해지면 바로 중단)
                while (true) {
                    const nextDaysInMonth = new Date(targetYear, targetMonth + 1, 0).getDate();
                    
                    for(let i=1; i<=nextDaysInMonth; i++) {
                        let d = new Date(targetYear, targetMonth, i);
                        let dateKey = `${targetYear}-${(targetMonth+1).toString().padStart(2,'0')}-${i.toString().padStart(2,'0')}`;
                        if (d.getDay() === 0 || d.getDay() === 6 || holidays[dateKey]) {
                            // 현재 최소 횟수인 근무자만 배정
                            const currentCounts = Object.values(workCount);
                            const currentMin = Math.min(...currentCounts);
                            const currentMax = Math.max(...currentCounts);
                            
                            if (currentMin !== currentMax) {
                                const dayWorkers = [];
                                const minPlayers = orderedPlayers.filter(p => workCount[p] === currentMin);
                                for (let w = 0; w < workerCount && w < minPlayers.length; w++) {
                                    const player = minPlayers[w];
                                    dayWorkers.push(player);
                                    workCount[player]++;
                                    currentPlayerIndex++;
                                }
                                if (dayWorkers.length > 0) {
                                    assignments[dateKey] = dayWorkers.join(', ');
                                    assignedDates.push(dateKey);
                                }
                            } else {
                                // 공평해지면 바로 중단
                                break;
                            }
                        }
                    }
                    
                    // 공평해졌는지 확인
                    const newCounts = Object.values(workCount);
                    const allEqual = newCounts.every(c => c === newCounts[0]);
                    if (allEqual) break;
                    
                    // 다음 달로 이동
                    targetMonth++;
                    if (targetMonth > 11) {
                        targetMonth = 0;
                        targetYear++;
                    }
                    // 1년 넘어가면 중단
                    if (targetYear > currentYear + 1) break;
                }
            }
            
            // 선택한 월로 달력 이동
            currentMonth = selectedMonth;
            document.getElementById('month-title').innerText = `${currentYear}년 ${currentMonth + 1}월`;
            renderCalendar();
            
            // 근무 횟수 요약
            const countSummary = orderedPlayers.map(p => `${p}: ${workCount[p]}회`).join(', ');
            const lastDate = assignedDates[assignedDates.length - 1];
            alert(`${currentYear}년 ${selectedMonth + 1}월부터 ${lastDate}까지 근무표가 반영되었습니다.\n${countSummary}`);
        }
        renderCalendar();
    </script>
</body>
</html>
