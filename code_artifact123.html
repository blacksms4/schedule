<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>휴일 근무 관리 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; border: 1px solid #ddd; background: #ddd; }
        .cell { background: white; min-height: 100px; padding: 5px; }
        .weekend { background: #fff5f5; color: #e11d48; }
        .holiday { background: #fff5f5; color: #dc2626; font-weight: bold; }
    </style>
</head>
<body class="bg-gray-50 p-6">
    <div class="max-w-6xl mx-auto bg-white p-6 rounded shadow">
        <h1 class="text-xl font-bold text-center mb-6">휴일 근무 관리 시스템</h1>
        
        <div class="bg-blue-50 p-4 border rounded mb-6">
            <h2 class="text-sm font-bold mb-2">입장하기</h2>
            <input type="text" placeholder="이름 입력" class="border p-1 text-sm">
            <button class="bg-blue-500 text-white px-3 py-1 text-sm rounded">입장 요청</button>
        </div>

        <div class="mb-4">
            <h2 class="font-bold border-b pb-2 mb-2">근무자 관리</h2>
            <div class="flex gap-4 mb-2">
                <span class="font-bold">근무 인원수:</span>
                <input type="number" value="1" class="border w-12 px-1">
            </div>
            <div id="member-list" class="border rounded p-2 bg-gray-50 w-64 mb-4 text-sm">
                정다운, 이영희, 박지민, 김철수, 최우주
            </div>
            <button onclick="startLadder()" class="bg-yellow-500 text-white px-4 py-2 rounded font-bold text-sm">사다리 타기(순번 정하기)</button>
            <button class="bg-blue-600 text-white px-4 py-2 rounded font-bold text-sm">자동 배정 적용</button>
        </div>

        <div class="text-center font-bold mb-4">2026년 7월</div>
        <div class="calendar-grid">
            <div class="text-center font-bold py-2 bg-gray-100 text-red-600">일</div>
            <div class="text-center font-bold py-2 bg-gray-100">월</div>
            <div class="text-center font-bold py-2 bg-gray-100">화</div>
            <div class="text-center font-bold py-2 bg-gray-100">수</div>
            <div class="text-center font-bold py-2 bg-gray-100">목</div>
            <div class="text-center font-bold py-2 bg-gray-100">금</div>
            <div class="text-center font-bold py-2 bg-gray-100 text-blue-600">토</div>
            
            <script>
                const members = ["정다운", "이영희", "박지민", "김철수", "최우주"];
                // 2026년 7월 1일은 수요일입니다.
                // 1일 이전의 빈 칸을 채워 요일을 맞춥니다.
                for(let i=0; i<3; i++) document.write('<div class="cell bg-gray-50"></div>');

                for(let i=1; i<=31; i++) {
                    let date = new Date(2026, 6, i);
                    let day = date.getDay(); // 0:일, 6:토
                    let isWeekend = (day === 0 || day === 6);
                    
                    document.write(`<div class="cell ${isWeekend ? 'weekend' : ''}">
                        <div class="font-bold text-sm">${i}</div>
                        <div class="text-xs mt-2 text-black">${(isWeekend) ? members[Math.floor(Math.random()*members.length)] : ''}</div>
                    </div>`);
                }
            </script>
        </div>
    </div>
    
    <script>
        function startLadder() {
            alert("사다리 타기를 통해 순번이 재설정되었습니다.");
            location.reload();
        }
    </script>
</body>
</html>
